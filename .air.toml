root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/hara ./cmd/bot/main.go"
  bin = "./tmp/hara"
  full_bin = "./tmp/hara"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "bin", ".git"]
  include_dir = ["cmd", "internal", "pkg"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = true
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
