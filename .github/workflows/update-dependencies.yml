name: Update Go Dependencies

on:
  schedule:
    # Run every Monday at 03:00 UTC
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Update Go modules
        run: |
          go get -u ./...
          go mod tidy

      - name: Run tests
        run: go test ./...

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update go dependencies"
          title: "chore: update Go dependencies"
          body: |
            Automated dependency update generated by GitHub Actions.

            This workflow runs `go get -u ./...`, `go mod tidy`, and `go test ./...`.
          branch: chore/update-go-dependencies
          delete-branch: true
          labels: dependencies, automated-pr
